name: Release Desktop Builds

on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"
      - "v[0-9]+.[0-9]+.[0-9]+-*"

permissions:
  contents: read

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify-version:
    name: Verify version consistency
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Check tag matches package.json / Cargo.toml / tauri.conf.json
        run: |
          set -euo pipefail
          TAG="${GITHUB_REF_NAME#v}"
          PKG=$(jq -r .version package.json)
          TAURI=$(jq -r .version src-tauri/tauri.conf.json)
          CARGO=$(awk -F\" '/^version[[:space:]]*=/ {print $2; exit}' src-tauri/Cargo.toml)
          echo "tag=$TAG package.json=$PKG tauri.conf.json=$TAURI Cargo.toml=$CARGO"
          if [ "$TAG" != "$PKG" ] || [ "$TAG" != "$TAURI" ] || [ "$TAG" != "$CARGO" ]; then
            echo "::error::Version mismatch — tag '$TAG' must equal package.json ($PKG), tauri.conf.json ($TAURI), and Cargo.toml ($CARGO)"
            exit 1
          fi

  build:
    name: Build ${{ matrix.name }}
    needs: verify-version
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Windows x86_64
            artifact_name: windows-x86_64
            runner: windows-latest
            target: x86_64-pc-windows-msvc
            bundle_args: --bundles nsis,msi
          - name: Windows ARM64
            artifact_name: windows-arm64
            runner: windows-11-arm
            target: aarch64-pc-windows-msvc
            bundle_args: --bundles nsis,msi
          - name: macOS x86_64
            artifact_name: macos-x86_64
            runner: macos-15-intel
            target: x86_64-apple-darwin
            bundle_args: --bundles dmg
          - name: macOS ARM64
            artifact_name: macos-arm64
            runner: macos-15
            target: aarch64-apple-darwin
            bundle_args: --bundles dmg
          - name: Linux x86_64
            artifact_name: linux-x86_64
            runner: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            bundle_args: --bundles deb,rpm

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Linux system dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libsoup-3.0-dev \
            libjavascriptcoregtk-4.1-dev

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache Rust dependencies
        uses: swatinem/rust-cache@v2
        with:
          workspaces: ./src-tauri -> target
          key: ${{ matrix.target }}

      - name: Install dependencies
        run: pnpm install --frozen-lockfile --ignore-scripts

      # 侧载 ConPTY 资源按架构分目录 vendor(见 src-tauri/resources/conpty/README.md),
      # 而 tauri.windows.conf.json 的 resources glob 无法按构建目标过滤;
      # 打包前删掉非目标架构目录,避免每个安装包多带一套 ~1.2MB 的无用二进制。
      # continue-on-error:此步只是包体优化,失败(如杀软扫描锁文件)就回到
      # "两套都打入"的现状,不值得中断整个 release 构建。
      - name: Prune non-target ConPTY arch (Windows)
        if: contains(matrix.target, 'windows')
        continue-on-error: true
        shell: pwsh
        run: |
          $keep = if ("${{ matrix.target }}".StartsWith("aarch64")) { "arm64" } else { "x64" }
          Get-ChildItem src-tauri/resources/conpty -Directory |
            Where-Object { $_.Name -ne $keep } |
            Remove-Item -Recurse -Force
          Write-Host "保留架构: $keep"

      - name: Build ${{ matrix.name }}
        run: pnpm tauri build --target ${{ matrix.target }} ${{ matrix.bundle_args }}

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          if-no-files-found: error
          path: |
            src-tauri/target/${{ matrix.target }}/release/bundle/dmg/*.dmg
            src-tauri/target/${{ matrix.target }}/release/bundle/nsis/*.exe
            src-tauri/target/${{ matrix.target }}/release/bundle/msi/*.msi
            src-tauri/target/${{ matrix.target }}/release/bundle/deb/*.deb
            src-tauri/target/${{ matrix.target }}/release/bundle/rpm/*.rpm

  release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: release-artifacts/**/*
          token: ${{ secrets.GITHUB_TOKEN }}
